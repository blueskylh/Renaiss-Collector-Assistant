name: Renaiss Collector Assistant CI

on:
  push:
  pull_request:

jobs:
  python-core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile scripts
        run: python3 -m py_compile skills/renaiss-collector-assistant/scripts/*.py
      - name: Run unit tests
        run: python3 -m unittest -v tests/test_core_logic.py
